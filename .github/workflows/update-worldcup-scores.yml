name: Update World Cup Scores

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update scores JSON
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: |
          python worldcup-dashboard/scripts/update_scores.py
          python worldcup-dashboard-v2/scripts/update_scores.py

      - name: Commit score updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worldcup-dashboard/data/matches.json
          git add worldcup-dashboard-v2/data/matches.json
          git add worldcup-dashboard-v2/data/version.json
          if git diff --cached --quiet; then
            echo "No score changes."
          else
            git commit -m "Update World Cup scores"
            git push
          fi
