name: Update World Cup Team Insights

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-team-insights:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build team insights cache
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          KAGGLE_RESULTS_CSV: worldcup-dashboard-v2/data/external/international_results.csv
        run: python worldcup-dashboard-v2/scripts/update_team_insights.py

      - name: Commit team insights
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worldcup-dashboard-v2/data/team-insights.json
          if git diff --cached --quiet; then
            echo "No team insights changes."
          else
            git commit -m "Update World Cup team insights"
            git push
          fi
