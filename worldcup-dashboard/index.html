<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>2026世界盃戰術沙盤</title><style>body{margin:0;background:#050914;color:#fff;font-family:system-ui,'Noto Sans TC',Arial,sans-serif}header{text-align:center;padding:14px}.app{max-width:1500px;margin:auto;padding:0 12px 24px}.tabs,.subtabs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:10px 0}.tab,.subtab,button{border:1px solid #26364f;background:#0b1324;color:#fff;padding:9px 14px;border-radius:999px;cursor:pointer}.tab.on,.subtab.on{background:#1d4ed8}.panel{display:none;background:#0b1324;border:1px solid #26364f;border-radius:16px;padding:14px}.panel.on{display:block}.card{background:#07101e;border:1px solid #26364f;border-radius:14px;padding:12px;margin:10px 0}table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:13px}th,td{border-bottom:1px solid #26364f;padding:8px;text-align:center}th{background:#0f172a;color:#cbd5e1}.team{text-align:center}input,select{background:#111827;color:#fff;border:1px solid #334155;border-radius:6px;padding:6px}.score{width:54px;text-align:center}.done{background:#14532d;color:#bbf7d0}.todo{background:#3b2f0b;color:#fde68a}.pill{display:inline-block;border-radius:999px;padding:3px 8px;font-size:12px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.r1{background:rgba(22,163,74,.24)}.r2{background:rgba(37,99,235,.24)}.r3{background:rgba(202,138,4,.22)}.r4{background:rgba(71,85,105,.22)}.detail{display:none;background:#020617;color:#cbd5e1;text-align:left}.detail.on{display:table-row}.badge{display:inline-block;margin:2px;padding:3px 7px;border:1px solid #3b4a67;border-radius:999px;background:#111827}.bracket{display:grid;grid-template-columns:1fr 1fr;gap:12px}.match{background:#0f172a;border:1px solid #344054;border-radius:10px;padding:8px;margin:7px 0}.line{display:grid;grid-template-columns:60px 1fr;gap:6px;margin:4px 0}.seed{font-weight:900}.scenarios{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.scenario{background:#0f172a;border:1px solid #344054;border-radius:14px;padding:12px}.bar{height:8px;background:#1e293b;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:#60a5fa}.prob{display:grid;grid-template-columns:1fr 48px;gap:8px;margin:6px 0}.warn{color:#fde68a}.good{color:#bef264}.bad{color:#fecaca}@media(max-width:900px){.grid,.bracket,.scenarios{grid-template-columns:1fr}}</style></head><body><header><h1>2026 世界盃戰術沙盤</h1><div style="color:#94a3b8">賽況 → 積分 → 32/16/8強 → 勝N球/和N:N/輸N球策略推演</div></header><div class="app"><div class="tabs"><button class="tab on" onclick="tab('scores',this)">賽事中心</button><button class="tab" onclick="tab('standings',this)">小組積分</button><button class="tab" onclick="tab('bracket',this)">樹狀晉級賽程</button><button class="tab" onclick="tab('sandbox',this)">情境沙盤</button></div><section id="scores" class="panel on"><div class="card"><button onclick="clearFuture()">清除未開賽預測比分</button><button onclick="calc()">重新計算</button></div><div id="scoreBoard"></div></section><section id="standings" class="panel"><div id="standingBoard" class="grid"></div></section><section id="bracket" class="panel"><div class="subtabs"><button class="subtab on" onclick="round('r32',this)">32強</button><button class="subtab" onclick="round('r16',this)">16強</button><button class="subtab" onclick="round('qf',this)">8強</button></div><div id="r32" class="round on"></div><div id="r16" class="round" style="display:none"></div><div id="qf" class="round" style="display:none"></div></section><section id="sandbox" class="panel"><div class="card"><label>隊伍 </label><select id="target" onchange="loadTeamMatches()"></select> <label>比賽 </label><select id="targetMatch"></select> <button onclick="runMatrix()">產生比分矩陣建議</button><div style="margin-top:8px;color:#94a3b8">會比較：勝1~4球、0:0/1:1/2:2、輸1~3球；建議由排名、淨勝球、進球、32強路線強度差異計算，不是寫死。</div></div><div id="matrix"></div></section></div><script>const G={A:['墨西哥','南非','大韓民國','捷克'],B:['加拿大','波士尼亞與赫塞哥維納','卡達','瑞士'],C:['巴西','摩洛哥','海地','蘇格蘭'],D:['美國','巴拉圭','澳洲','土耳其'],E:['德國','庫拉索','象牙海岸','厄瓜多'],F:['荷蘭','日本','瑞典','突尼西亞'],G:['比利時','埃及','伊朗','紐西蘭'],H:['西班牙','佛得角','沙烏地阿拉伯','烏拉圭'],I:['法國','塞內加爾','伊拉克','挪威'],J:['阿根廷','阿爾及利亞','奧地利','約旦'],K:['葡萄牙','剛果民主共和國','烏茲別克','哥倫比亞'],L:['英格蘭','克羅埃西亞','迦納','巴拿馬']};

3','K','哥倫比亞','剛果民主共和國',null,null,0],['2026-06-24','B','瑞士','加拿大',null,null,0],['2026-06-24','B','波士尼亞與赫塞哥維納','卡達',null,null,0],['2026-06-24','C','蘇格蘭','巴西',null,null,0],['2026-06-24','C','摩洛哥','海地',null,null,0],['2026-06-24','A','捷克','墨西哥',null,null,0],['2026-06-24','A','南非','大韓民國',null,null,0],['2026-06-25','E','厄瓜多','德國',null,null,0],['2026-06-25','E','庫拉索','象牙海岸',null,null,0],['2026-06-25','F','突尼西亞','荷蘭',null,null,0],['2026-06-25','F','日本','瑞典',null,null,0],['2026-06-25','D','土耳其','美國',null,null,0],['2026-06-25','D','巴拉圭','澳洲',null,null,0],['2026-06-26','I','挪威','法國',null,null,0],['2026-06-26','I','塞內加爾','伊拉克',null,null,0],['2026-06-26','H','烏拉圭','西班牙',null,null,0],['2026-06-26','H','佛得角','沙烏地阿拉伯',null,null,0],['2026-06-26','G','紐西蘭','比利時',null,null,0],['2026-06-26','G','埃及','伊朗',null,null,0],['2026-06-27','L','巴拿馬','英格蘭',null,null,0],['2026-06-27','L','克羅埃西亞','迦納',null,null,0],['2026-06-27','K','哥倫比亞','葡萄牙',null,null,0],['2026-06-27','K','剛果民主共和國','烏茲別克',null,null,0],['2026-06-27','J','約旦','阿根廷',null,null,0],['2026-06-27','J','阿爾及利亞','奧地利',null,null,0]].map((x,i)=>({id:i+1,date:x[0],g:x[1],h:x[2],a:x[3],hg:x[4],ag:x[5],done:!!x[6]}));
const r32=[['M73','A2','B2'],['M74','E1','3'],['M75','F1','C2'],['M76','C1','F2'],['M77','I1','3'],['M78','E2','I2'],['M79','A1','3'],['M80','L1','3'],['M81','D1','3'],['M82','G1','3'],['M83','K2','L2'],['M84','H1','J2'],['M85','B1','3'],['M86','J1','H2'],['M87','K1','3'],['M88','D2','G2']];
const third={M74:['A','B','C','D','F'],M77:['C','D','F','G','H'],M79:['C','E','F','H','I'],M80:['E','H','I','J','K'],M81:['B','E','F','I','J'],M82:['A','E','H','I','J'],M85:['E','F','G','I','J'],M87:['D','E','I','J','L']};
const r16=[['M89','M73','M75'],['M90','M74','M77'],['M91','M76','M78'],['M92','M79','M80'],['M93','M83','M84'],['M94','M81','M82'],['M95','M86','M88'],['M96','M85','M87']],qf=[['M97','M89','M90'],['M98','M93','M94'],['M99','M91','M92'],['M100','M95','M96']];
let ST,R32;
function tab(id,b){document.querySelectorAll('.panel').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));document.getElementById(id).classList.add('on');b.classList.add('on');calc()}function round(id,b){document.querySelectorAll('.round').forEach(x=>x.style.display='none');document.querySelectorAll('.subtab').forEach(x=>x.classList.remove('on'));document.getElementById(id).style.display='block';b.classList.add('on')}
function d(s){let x=new Date(s+'T00:00:00');return `${x.getMonth()+1}/${x.getDate()}`}function save(){M.forEach(m=>{let h=document.getElementById('h'+m.id),a=document.getElementById('a'+m.id);if(h&&!m.done){m.hg=h.value===''?null:+h.value;m.ag=a.value===''?null:+a.value}})}function clearFuture(){M.forEach(m=>{if(!m.done){m.hg=null;m.ag=null}});drawScores();calc()}
function drawScores(){let dates=[...new Set(M.map(x=>x.date))];scoreBoard.innerHTML=dates.map(dt=>`<div class=card><h3>${d(dt)} 賽程</h3><table><thead><tr><th>日期</th><th>組</th><th>主隊</th><th>主分</th><th>客分</th><th>客隊</th><th>狀態</th></tr></thead><tbody>${M.filter(x=>x.date===dt).map(m=>`<tr><td>${d(m.date)}</td><td>${m.g}</td><td class=team>${m.h}</td><td><input class=score id=h${m.id} value='${m.hg??''}' ${m.done?'disabled':''} onchange='save();calc()'></td><td><input class=score id=a${m.id} value='${m.ag??''}' ${m.done?'disabled':''} onchange='save();calc()'></td><td class=team>${m.a}</td><td><span class='pill ${m.done?'done':'todo'}'>${m.done?'已完賽':'未開賽'}</span></td></tr>`).join('')}</tbody></table></div>`).join('')}
function standings(list=M){let s={};Object.keys(G).forEach(g=>s[g]=G[g].map(t=>({team:t,g,P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0,str:0})));list.forEach(m=>{if(m.hg==null||m.ag==null)return;let h=s[m.g].find(x=>x.team===m.h),a=s[m.g].find(x=>x.team===m.a);h.P++;a.P++;h.GF+=m.hg;h.GA+=m.ag;a.GF+=m.ag;a.GA+=m.hg;if(m.hg>m.ag){h.W++;a.L++;h.Pts+=3}else if(m.hg<m.ag){a.W++;h.L++;a.Pts+=3}else{h.D++;a.D++;h.Pts++;a.Pts++}});Object.keys(s).forEach(g=>{s[g].forEach(x=>{x.GD=x.GF-x.GA;x.str=x.Pts*10+x.GD*2+x.GF});s[g].sort((a,b)=>b.Pts-a.Pts||b.GD-a.GD||b.GF-a.GF||a.team.localeCompare(b.team,'zh-Hant'))});return s}
function drawStandings(){standingBoard.innerHTML=Object.keys(ST).map(g=>`<div class=card><h3>${g}組</h3><table><thead><tr><th>名</th><th>隊伍</th><th>賽</th><th>積</th><th>淨</th><th>進/失</th></tr></thead><tbody>${ST[g].map((x,i)=>`<tr class=r${i+1} onclick="document.getElementById('det${g}${i}').classList.toggle('on')"><td>${i+1}</td><td>${x.team}</td><td>${x.P}</td><td><b>${x.Pts}</b></td><td>${x.GD}</td><td>${x.GF}/${x.GA}</td></tr><tr id=det${g}${i} class=detail><td colspan=6>勝 ${x.W}｜和 ${x.D}｜負 ${x.L}｜進球 ${x.GF}｜失球 ${x.GA}｜淨勝 ${x.GD}</td></tr>`).join('')}</tbody></table></div>`).join('')}
function assignThird(st){let th=Object.keys(st).map(g=>st[g][2]).sort((a,b)=>b.Pts-a.Pts||b.GD-a.GD||b.GF-a.GF).slice(0,8).map(x=>x.g),out={},used=new Set(),slots=Object.keys(third);function dfs(i){if(i===slots.length)return true;let s=slots[i],c=third[s].filter(g=>th.includes(g)&&!used.has(g));for(let g of c){used.add(g);out[s]=g;if(dfs(i+1))return true;used.delete(g);delete out[s]}return false}dfs(0);return out}
function slot(st,tm,id,x){if(x==='3'){let g=tm[id];if(!g)return{seed:'最佳3',team:'候選 '+third[id].join('/'),str:20};let t=st[g][2];return{seed:g+'3',team:t.team,str:t.str}}let g=x[0],r=+x[1]-1,t=st[g][r];return{seed:x,team:t.team,str:t.str}}
function makeR32(st){let tm=assignThird(st);return r32.map(([id,a,b])=>({id,a:slot(st,tm,id,a),b:slot(st,tm,id,b)}))}function match(m){return `<div class=match><b>${m.id}</b><div class=line><span class=seed>${m.a.seed}</span><span>${m.a.team}</span></div><div class=line><span class=seed>${m.b.seed}</span><span>${m.b.team}</span></div></div>`}
function drawBracket(){let left=R32.slice(0,8).map(match).join(''),right=R32.slice(8).map(match).join('');r32.innerHTML=`<div class=bracket><div class=card><h3>32強左半區</h3>${left}</div><div class=card><h3>32強右半區</h3>${right}</div></div>`;r16.innerHTML=`<div class=bracket>${r16.map(x=>`<div class=match><b>${x[0]}</b><br>${x[1]}勝者 vs ${x[2]}勝者</div>`).join('')}</div>`;qf.innerHTML=`<div class=bracket>${qf.map(x=>`<div class=match><b>${x[0]}</b><br>${x[1]}勝者 vs ${x[2]}勝者</div>`).join('')}</div>`}
function oppsFor(seed,st){if(seed==='最佳3')return[];let g=seed[0],rank=+seed[1];let arr=st[g].map((x,i)=>({team:x.team,p:Math.max(1,x.Pts*8+x.GD*2+x.GF+(i+1===rank?12:0)),str:x.str}));let total=arr.reduce((a,b)=>a+b.p,0);return arr.map(x=>({...x,pct:Math.round(x.p/total*100)})).sort((a,b)=>b.pct-a.pct)}
function path(team,st){let r=makeR32(st),m=r.find(x=>x.a.team===team||x.b.team===team);if(!m)return{seed:'淘汰',msg:'未進32強',opps:[],route:99};let self=m.a.team===team?m.a:m.b,opp=m.a.team===team?m.b:m.a,opps=oppsFor(opp.seed,st);let avg=opps.length?Math.round(opps.reduce((a,b)=>a+b.str*b.pct,0)/100):opp.str;return{seed:self.seed,msg:`${m.id} 對手來源 ${opp.seed}`,opps,route:avg}}
function loadTargets(){target.innerHTML=Object.values(G).flat().map(t=>`<option>${t}</option>`).join('');loadTeamMatches()}function loadTeamMatches(){let t=target.value,ms=M.filter(m=>!m.done&&(m.h===t||m.a===t)).sort((a,b)=>a.date.localeCompare(b.date));targetMatch.innerHTML=ms.map(m=>`<option value=${m.id}>${d(m.date)} ${m.h} vs ${m.a}</option>`).join('')}
function simResult(team,mid,forG,agG,label){let sim=M.map(x=>({...x})),m=sim.find(x=>x.id===mid),home=m.h===team;m.hg=home?forG:agG;m.ag=home?agG:forG;let st=standings(sim),g=m.g,rank=st[g].findIndex(x=>x.team===team)+1,rec=st[g][rank-1],p=path(team,st);return{label,rank,rec,path:p}}
function advice(rows){let best=[...rows].sort((a,b)=>a.path.route-b.path.route||a.rank-b.rank)[0],change=rows.filter(x=>x.path.seed!==rows[0].path.seed).length>0,need='';if(change)need='不同球數會改變晉級身分或路線，需特別控淨勝球/進球數。';else need='不同球數暫不改變身分，但會影響第三名排序與後續對手機率。';return `建議優先目標：${best.label}。原因：推估路線強度最低（${best.path.route}），身份 ${best.path.seed}。${need}`}
function runMatrix(){let team=target.value,mid=+targetMatch.value;if(!mid)return;let cases=[];for(let n=1;n<=4;n++)cases.push([`勝${n}球`,n,0]);[[0,0],[1,1],[2,2]].forEach(x=>cases.push([`${x[0]}:${x[1]}和`,x[0],x[1]]));for(let n=1;n<=3;n++)cases.push([`輸${n}球`,0,n]);let rows=cases.map(c=>simResult(team,mid,c[1],c[2],c[0]));let cards=rows.map(r=>`<div class=scenario><h3>${r.label}｜${r.path.seed}</h3><div>排名：${r.rec.g}組第${r.rank}｜${r.rec.Pts}分｜GD ${r.rec.GD}｜GF ${r.rec.GF}</div><div class=warn>${r.path.msg}｜路線強度 ${r.path.route}</div>${r.path.opps.slice(0,5).map(o=>`<div class=prob><div>${o.team}<div class=bar><i style='width:${o.pct}%'></i></div></div><div>${o.pct}%</div></div>`).join('')||'<div class=bad>無明確32強對手</div>'}</div>`).join('');matrix.innerHTML=`<div class=card><h3>策略建議</h3><div class=good>${advice(rows)}</div></div><div class=scenarios>${cards}</div>`}
function calc(){save();ST=standings();R32=makeR32(ST);drawStandings();drawBracket();loadTeamMatches()}function init(){drawScores();loadTargets();calc()}init();
