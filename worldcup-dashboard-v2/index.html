<body>
<header>
  <h1>2026 世界盃戰術沙盤</h1>
</header>
<div class="app">
  <div class="tabs">
    <button class="tab on" onclick="tab('scores',this)">賽事中心</button>
    <button class="tab" onclick="tab('standings',this)">小組積分</button>
    <button class="tab" onclick="tab('bracket',this)">賽程表</button>
    <button class="tab" onclick="tab('sandbox',this)">情境沙盤</button>
  </div>

  <section id="scores" class="panel on">
    <div id="scoreBoard"></div>
  </section>

  <section id="standings" class="panel">
    <div class="card toolbar">
      <label>搜尋隊伍 <input id="standingSearch" placeholder="輸入隊伍名稱" oninput="STANDING_FILTER=this.value;drawStandings()"></label>
    </div>
    <div id="standingBoard" class="grid"></div>
  </section>

  <section id="bracket" class="panel">
    <div class="bracketTabs">
      <button class="roundBtn active" onclick="showTreeRound('groupStage',this)">小組賽</button>
      <button class="roundBtn" onclick="showTreeRound('tree32',this)">32強</button>
      <button class="roundBtn" onclick="showTreeRound('tree16',this)">16強</button>
      <button class="roundBtn" onclick="showTreeRound('tree8',this)">8強</button>
      <button class="roundBtn" onclick="showTreeRound('tree4',this)">4強</button>
    </div>
    <div id="groupStage" class="roundView active"><div id="groupStageBoard"></div></div>
    <div id="tree32" class="roundView"><div class="treeStage" id="stage32"><svg class="treeLines" id="treeLines32"></svg><div id="treeNodes32"></div></div></div>
    <div id="tree16" class="roundView"><div class="treeStage" id="stage16"><svg class="treeLines" id="treeLines16"></svg><div id="treeNodes16"></div></div></div>
    <div id="tree8" class="roundView"><div class="treeStage" id="stage8"><svg class="treeLines" id="treeLines8"></svg><div id="treeNodes8"></div></div></div>
    <div id="tree4" class="roundView"><div class="treeStage" id="stage4"><svg class="treeLines" id="treeLines4"></svg><div id="treeNodes4"></div></div></div>
  </section>

  <section id="sandbox" class="panel">
    <datalist id="teamOptions"></datalist>
    <div id="scoreControl" class="card"></div>
    <div class="card aiPanel" id="creatorAiPanel" hidden>
      <h3>策略分析(僅限建立者)</h3>
      <div class="toolbar aiControls">
        <label>Ollama 端點 <input id="ollamaEndpoint" value="http://localhost:11434/api/chat"></label>
        <label>模型 <input id="ollamaModel" value="qwen2.5:3b-instruct"></label>
        <label>自動抓取 <input id="researchEndpoint" value="http://127.0.0.1:8777/api/research"></label>
        <button onclick="analyzeWithLocalQwen()">產生建議</button>
      </div>
      <label>補充新聞 / 戰術資訊
        <textarea id="aiContext" placeholder="自動抓取不足時，可貼上你看到的傷兵、輪換、教練發言、媒體報導摘要。"></textarea>
      </label>
      <div id="aiStrategyResult" class="routeCard aiResult muted">請先啟動本機 Ollama，選定隊伍與比分後按「產生建議」。</div>
    </div>
    <div id="scenarioImpact"></div>
  </section>

</div>

function mergeScores(payload){

    const status=remote.status||seed.status;
    return {...seed,utc_date:remote.utc_date||remote.utcDate||seed.utc_date||'',hg:hg??null,ag:ag??null,status,done:['FINISHED','AWARDED'].includes(status)};

const ANNEX_C_ENGINE={
  blankTeam(group,team){return{group,team,P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0,str:0,rankNote:''}},
  calculate(matches){
    const st={};Object.keys(GROUPS).forEach(g=>st[g]=GROUPS[g].map(t=>this.blankTeam(g,t)));
    matches.forEach(m=>{if(!isPlayed(m))return;let h=st[m.g].find(x=>x.team===m.h),a=st[m.g].find(x=>x.team===m.a);if(!h||!a)return;h.P++;a.P++;h.GF+=m.hg;h.GA+=m.ag;a.GF+=m.ag;a.GA+=m.hg;if(m.hg>m.ag){h.W++;a.L++;h.Pts+=3}else if(m.hg<m.ag){a.W++;h.L++;a.Pts+=3}else{h.D++;a.D++;h.Pts++;a.Pts++}});
    Object.keys(st).forEach(g=>{st[g].forEach(x=>{x.GD=x.GF-x.GA;x.str=this.teamStrength(x)});st[g]=this.rankGroup(st[g],matches.filter(m=>m.g===g))});
    return st;
  },
  teamStrength(t){return Math.round((RATING[t.team]||70)+t.Pts*5+t.GD*2+t.GF)},
  rankGroup(rows,groupMatches){
    const base=[...rows].sort((a,b)=>b.Pts-a.Pts||b.GD-a.GD||b.GF-a.GF);
    let out=[];
    for(let i=0;i<base.length;){
      let tied=base.filter(x=>x.Pts===base[i].Pts&&x.GD===base[i].GD&&x.GF===base[i].GF);
      if(tied.length===1){out.push(base[i]);i++;continue}
      let mini=this.miniTable(tied.map(x=>x.team),groupMatches);
      tied.sort((a,b)=>mini[b.team].Pts-mini[a.team].Pts||mini[b.team].GD-mini[a.team].GD||mini[b.team].GF-mini[a.team].GF||a.team.localeCompare(b.team,'zh-Hant'));
      tied.forEach(x=>x.rankNote='');
      out.push(...tied);i+=tied.length;
    }
    return out;
  },
  miniTable(teams,matches){
    const mini={};teams.forEach(t=>mini[t]={Pts:0,GF:0,GA:0,GD:0});
    matches.forEach(m=>{if(!isPlayed(m)||!teams.includes(m.h)||!teams.includes(m.a))return;mini[m.h].GF+=m.hg;mini[m.h].GA+=m.ag;mini[m.a].GF+=m.ag;mini[m.a].GA+=m.hg;if(m.hg>m.ag)mini[m.h].Pts+=3;else if(m.hg<m.ag)mini[m.a].Pts+=3;else{mini[m.h].Pts++;mini[m.a].Pts++}});
    Object.values(mini).forEach(x=>x.GD=x.GF-x.GA);return mini;
  }
};
const THIRD_PLACE_ENGINE={
  ranking(st){return Object.keys(st).map(g=>({...st[g][2],seed:g+'3'})).sort((a,b)=>b.Pts-a.Pts||b.GD-a.GD||b.GF-a.GF||b.str-a.str||a.group.localeCompare(b.group))},
  qualified(st){return this.ranking(st).slice(0,8)},
  assign(st){
    const qualified=this.qualified(st).map(x=>x.group),slots=Object.keys(THIRD_RULE),out={},used=new Set();
    const dfs=i=>{if(i===slots.length)return true;const slot=slots[i];const choices=THIRD_RULE[slot].filter(g=>qualified.includes(g)&&!used.has(g));for(const g of choices){used.add(g);out[slot]=g;if(dfs(i+1))return true;used.delete(g);delete out[slot]}return false};
    dfs(0);return out;
  }
};
const BRACKET_ENGINE={
  slot(st,thirdMap,matchId,seed){
    if(seed==='3'){let g=thirdMap[matchId];if(!g)return{seed:'最佳3',team:'候選 '+THIRD_RULE[matchId].join('/'),str:74,group:null,rank:3};let t=st[g][2];return{seed:g+'3',team:t.team,str:t.str,group:g,rank:3}}

  r32(st){const thirdMap=THIRD_PLACE_ENGINE.assign(st);return R32_TEMPLATE.map(([id,a,b])=>({id,a:this.slot(st,thirdMap,id,a),b:this.slot(st,thirdMap,id,b)}))},
  findTeam(team,bracket){let m=bracket.find(x=>x.a.team===team||x.b.team===team);if(!m)return null;let self=m.a.team===team?m.a:m.b,opp=m.a.team===team?m.b:m.a;return{match:m,self,opp,route:this.routeStrength(m,team,bracket)}},
  routeStrength(match,team,bracket){let first=(match.a.team===team?match.b:match.a).str;let side=bracket.indexOf(match)<8?bracket.slice(0,8):bracket.slice(8);let avg=side.reduce((s,m)=>s+m.a.str+m.b.str,0)/(side.length*2);return Math.round(first*.65+avg*.35)}
};
const MONTE_CARLO_ENGINE={
  runs(team,count){
    const opponentCounts={},seedCounts={},route=[],qual={in:0,out:0};
    for(let i=0;i<count;i++){
      const sim=MATCHES.map(m=>({...m}));
      sim.forEach(m=>{if(isPlayed(m))return;let r=this.randomScore(m.h,m.a);m.hg=r[0];m.ag=r[1]});
      const st=ANNEX_C_ENGINE.calculate(sim),br=BRACKET_ENGINE.r32(st),path=BRACKET_ENGINE.findTeam(team,br);
      if(path){qual.in++;opponentCounts[path.opp.team]=(opponentCounts[path.opp.team]||0)+1;seedCounts[path.self.seed]=(seedCounts[path.self.seed]||0)+1;route.push(path.route)}else qual.out++;

  percentRows(obj,total){return Object.entries(obj).map(([name,n])=>({name,n,pct:Math.round(n/total*100)})).sort((a,b)=>b.n-a.n||a.name.localeCompare(b.name,'zh-Hant'))},
  randomScore(home,away){const diff=((RATING[home]||70)-(RATING[away]||70))/16;const hBase=1.25+Math.max(-.55,Math.min(.75,diff));const aBase=1.05+Math.max(-.55,Math.min(.75,-diff));return[this.goals(hBase),this.goals(aBase)]},

const STRATEGY_ENGINE={
  snapshot(team,st,br){const g=Object.keys(st).find(k=>st[k].some(x=>x.team===team));let rank=g?st[g].findIndex(x=>x.team===team)+1:0;let row=g?st[g][rank-1]:null;let path=BRACKET_ENGINE.findTeam(team,br);return{team,group:g,rank,row,path,qualified:!!path,seed:path?path.self.seed:'淘汰',route:path?path.route:99}},

    const sim=MATCHES.map(x=>({...x})),m=sim.find(x=>x.id===matchId),home=m.h===team;m.hg=home?forGoals:againstGoals;m.ag=home?againstGoals:forGoals;

  },

    return Object.values(GROUPS).flat().filter(t=>t!==target).map(t=>{let before=this.snapshot(t,oldSt,oldBr),after=this.snapshot(t,newSt,newBr);return{team:t,before,after,score:this.impactScore(before,after)}}).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,7);

function thirdIndex(st,team){return THIRD_PLACE_ENGINE.ranking(st).findIndex(x=>x.team===team)}
function deltaChip(label,before,after,invert=false){
  if(!Number.isFinite(before)||!Number.isFinite(after))return `<span class="chip">${label} -</span>`;
  if(before===after)return `<span class="chip">${label} ${after}</span>`;
  const diff=after-before,good=invert?diff<0:diff>0,sign=diff>0?'+':'';
  return `<span class="chip ${good?'good':'bad'}">${label} ${before} → ${after} (${sign}${diff})</span>`;
}
function seedChip(before,after){
  if(before===after)return `<span class=chip>${after}</span>`;
  return `<span class="chip warn">${before} → ${after}</span>`;
}
function scenarioSnapshot(team,pack){return STRATEGY_ENGINE.snapshot(team,pack.standings,pack.bracket)}
function impactForTeam(team,pack){
  const before=scenarioSnapshot(team,STATE),after=scenarioSnapshot(team,pack),bi=thirdIndex(STATE.standings,team),ai=thirdIndex(pack.standings,team);
  let score=0;
  if(before.rank!==after.rank)score+=3;
  if((before.row?.Pts??0)!==(after.row?.Pts??0))score+=3;
  if((before.row?.GD??0)!==(after.row?.GD??0))score+=2;
  if(before.seed!==after.seed)score+=3;
  if(before.qualified!==after.qualified)score+=4;
  if(bi!==ai&&ai>=0)score+=2;
  return{team,before,after,bi,ai,score};
}
function impactTone(x){
  const rankGain=(x.before.rank||9)-(x.after.rank||9),ptsGain=(x.after.row?.Pts??0)-(x.before.row?.Pts??0),gdGain=(x.after.row?.GD??0)-(x.before.row?.GD??0);
  if(x.after.qualified&&!x.before.qualified)return{icon:'▲',cls:'good',label:'受益'};
  if(!x.after.qualified&&x.before.qualified)return{icon:'▼',cls:'bad',label:'受損'};
  if(rankGain>0||ptsGain>0||gdGain>0)return{icon:'▲',cls:'good',label:'受益'};
  if(rankGain<0||ptsGain<0||gdGain<0)return{icon:'▼',cls:'bad',label:'受損'};
  return{icon:'●',cls:'warn',label:'風險'};
}
function routeSummary(snap){return snap.path?`32強對手：${snap.path.match.id}｜${snap.path.self.seed} vs ${snap.path.opp.seed} ${snap.path.opp.team}`:'未進32強'}
function impactCard(x){
  const tone=impactTone(x),br=x.before.row||{},ar=x.after.row||{};
  const third=(x.ai>=0&&x.bi!==x.ai)?`<span class="chip warn">第三名 #${x.bi+1||'-'} → #${x.ai+1}</span>`:'';
  return `<div class=impactCard><h4><span class=${tone.cls}>${tone.icon} ${x.team}</span><span class="chip ${tone.cls}">${tone.label}</span></h4><div>${deltaChip('排名',x.before.rank||0,x.after.rank||0,true)} ${deltaChip('積分',br.Pts??0,ar.Pts??0)} ${deltaChip('淨勝球',br.GD??0,ar.GD??0)} ${seedChip(x.before.seed,x.after.seed)} ${third}</div><div class=muted>${routeSummary(x.after)}</div></div>`;
}
function tieRiskRows(pack){
  const scenarioGroups=[...new Set((pack.scenarios||[pack.match]).map(m=>m.g))],chips=[];
  scenarioGroups.forEach(g=>{
    const byPts={},rows=pack.standings[g]||[];
    rows.forEach(x=>{byPts[x.Pts]=byPts[x.Pts]||[];byPts[x.Pts].push(x)});
    Object.values(byPts).filter(xs=>xs.length>1).forEach(xs=>chips.push(`<span class="chip warn">${g}組同積分 ${xs[0].Pts}：${xs.map(x=>`${x.team} 淨勝球 ${x.GD}`).join(' / ')}</span>`));
  });
  return chips.join('')||'<span class=chip>目前無同積分群組</span>';
}
function fixedSeedGroup(seed){return seed&&seed!=='3'?seed[0]:null}
function pairedGroupsForGroup(group){
  const out=new Set();
  R32_TEMPLATE.forEach(([,a,b])=>{
    const groups=[fixedSeedGroup(a),fixedSeedGroup(b)];
    if(groups.includes(group))groups.filter(g=>g&&g!==group).forEach(g=>out.add(g));
  });
  return [...out];
}
function rankedGroupRows(st,group){return (st[group]||[]).map((x,i)=>({...x,rank:i+1,seed:i<3?`${group}${i+1}`:'淘汰'}))}
function seedTeamLabel(st,seed){
  if(seed==='3')return '最佳第三名';
  const group=fixedSeedGroup(seed),rank=+seed.slice(1),row=rankedGroupRows(st,group)[rank-1];
  return row?`${seed} ${row.team}`:`${seed} 待定`;
}
function seedTeamInfo(st,seed){
  if(seed==='3')return{seed,team:'最佳第三名'};
  const group=fixedSeedGroup(seed),rank=+seed.slice(1),row=rankedGroupRows(st,group)[rank-1];
  return{seed,team:row?.team||'待定'};
}
function scenarioSideClass(team,match){
  if(team===match.h)return 'sideHome';
  if(team===match.a)return 'sideAway';
  return '';
}
function scenarioDeltaText(base,after,key,showZero){
  const delta=(after?.[key]??0)-(base?.[key]??0);
  const value=base?.[key]??0;
  if(!showZero&&delta===0)return `${value}`;
  return `${value}<span class=statDelta>${delta>=0?'+':''}${delta}</span>`;
}
function scenarioWldText(base,after,showDelta){
  const value=`${base?.W??0}-${base?.L??0}-${base?.D??0}`;
  if(!showDelta)return value;
  const dw=(after?.W??0)-(base?.W??0),dl=(after?.L??0)-(base?.L??0),dd=(after?.D??0)-(base?.D??0);
  return `${value}<span class=statDelta>+${dw}/${dl}/${dd}</span>`;
}
function rankLabel(rank){return rank===1?'1st':rank===2?'2nd':rank===3?'3rd':rank}
function groupStatCard(group,rows,focus,match,baseRows){
  const baseByTeam=new Map((baseRows||[]).map(x=>[x.team,x]));
  const body=rows.map(x=>{
    const base=baseByTeam.get(x.team)||x,showDelta=x.team===match.h||x.team===match.a;
    return `<div class="teamStat ${x.rank<=3?'rank'+x.rank:''} ${focus.has(x.team)?'active':''} ${scenarioSideClass(x.team,match)}"><b>${x.rank<=3?`<span class=rankTag>${rankLabel(x.rank)}</span>`:x.rank}</b>${teamDisplay(x.team)}<span>${scenarioDeltaText(base,x,'P',showDelta)}</span><span>${scenarioWldText(base,x,showDelta)}</span><b>${scenarioDeltaText(base,x,'Pts',showDelta)}</b><span>${scenarioDeltaText(base,x,'GD',showDelta)}</span></div>`;
  }).join('');
  return `<div class=groupPanel><h4>${group}組</h4><div class="teamStat muted"><span>名</span><span>隊伍</span><span>局</span><span>勝負和</span><span>積分</span><span>淨勝球</span></div>${body}</div>`;
}
function matchupTeamCard(info,match){
  return `<div class="duelTeam ${scenarioSideClass(info.team,match)}"><small>${info.seed}</small>${teamDisplay(info.team)}</div>`;
}
function matchupLine(id,a,b,st,match){
  const left=seedTeamInfo(st,a),right=seedTeamInfo(st,b);
  return `<div class=duelLine><span class=duelMatchId>${id}</span><div class=duelTeams>${matchupTeamCard(left,match)}<div class=duelVs>VS</div>${matchupTeamCard(right,match)}</div></div>`;
}
function pairingLinesForGroups(st,groups,match){
  return R32_TEMPLATE.flatMap(([id,a,b])=>{
    const ag=fixedSeedGroup(a),bg=fixedSeedGroup(b),inA=groups.includes(ag),inB=groups.includes(bg);
    if(inA&&inB)return [matchupLine(id,a,b,st,match)];
    if((inA||inB)&&(a==='3'||b==='3'))return [matchupLine(id,a,b,st,match)];
    return [];
  });
}
function groupDuelAnalysis(pack){
  const group=pack.match.g,paired=pairedGroupsForGroup(group)[0],groups=paired?[group,paired]:[group],focus=new Set([primaryScenarioTeam(),...pack.scenarios.flatMap(m=>[m.h,m.a])]);
  const panels=groups.map(g=>groupStatCard(g,rankedGroupRows(pack.standings,g),focus,pack.match,rankedGroupRows(STATE.standings,g)));
  const lines=pairingLinesForGroups(pack.standings,groups,pack.match);
  const bridge=`<div class=duelPanel>${(lines.length?lines:[`<div class=duelLine><span class=duelMatchId>${group}組</span><div class=muted>目前沒有固定配對小組</div></div>`]).join('')}</div>`;
  return `<div class=groupDuel>${panels[0]}${bridge}${panels[1]||''}</div>`;
}
function runScenarioImpact(){
  if(!STATE||!scenarioImpact)return;
  const pack=simulateScenarioState();if(!pack){scenarioImpact.innerHTML='';return}
  const m=pack.match,teams=Object.values(GROUPS).flat(),focus=new Set([primaryScenarioTeam(),...pack.scenarios.flatMap(x=>[x.h,x.a])]);
  const impacts=teams.map(t=>impactForTeam(t,pack)).filter(x=>x.score>0||focus.has(x.team)).sort((a,b)=>(focus.has(b.team)-focus.has(a.team))||b.score-a.score).slice(0,12);
  const selected=impactForTeam(primaryScenarioTeam(),pack);
  const phase=currentTournamentPhase();
  const mode=phase==='group'?'小組賽分析':selected.after.qualified?'32強分析':'淘汰賽分析';
  const strategy=phase==='group'?groupDuelAnalysis(pack):`<div class=impactGrid>${impacts.map(impactCard).join('')}</div>`;
  const thirdCard=`<div class=card><h3>最佳第三名</h3><div class=muted>依上方沙盤比分即時重算，尚未完賽不代表確定晉級。</div>${thirdRankingTable(pack.thirdRanking)}</div>`;
  const summary=pack.scenarios.map(x=>`<div class=routeCard><b>${teamDisplay(x.h)} ${x.hg}:${x.ag} ${teamDisplay(x.a)}</b></div>`).join('');
  scenarioImpact.innerHTML=`<div class=card><h3>${mode}</h3>${summary}<div>${tieRiskRows(pack)}</div></div>${strategy}${thirdCard}`;
}
function recalculate(){
  saveInputs();
  const standings=ANNEX_C_ENGINE.calculate(MATCHES),thirdRanking=THIRD_PLACE_ENGINE.ranking(standings),thirdMap=THIRD_PLACE_ENGINE.assign(standings),bracket=BRACKET_ENGINE.r32(standings);
  STATE={standings,thirdRanking,thirdMap,bracket};
  drawStandings();drawBracket();
  runScenarioImpact();
}
const AUTO_REFRESH={
  api:'data/version.json',
  current:null,
  timer:null,
  async latestVersion(){
    const res=await fetch(`${this.api}?t=${Date.now()}`,{cache:'no-store'});
    if(!res.ok)throw new Error('version check failed');
    const payload=await res.json();
    return payload.version||payload.updated_at||null;
  },
  async check(){
    try{
      const version=await this.latestVersion();
      if(!version)return;
      if(!this.current){this.current=version;return}
      if(version!==this.current)location.reload();
    }catch(_){}
  },
  start(){
    this.check();
    this.timer=setInterval(()=>this.check(),60000);
  }
};
const DEFAULT_OLLAMA_MODEL='qwen2.5:3b-instruct';
function normalizeLocalModel(model){
  const value=(model||'').trim();
  if(!value||value==='qwen2.5:7b')return DEFAULT_OLLAMA_MODEL;
  return value;
}
async function init(){
  try{const res=await fetch('data/matches.json',{cache:'no-store'});if(res.ok)mergeScores(await res.json());else mergeScores({matches:[]})}catch(_){mergeScores({matches:[]})}
  const aiPanel=document.getElementById('creatorAiPanel');
  if(aiPanel){
    if(isLocalCreator())aiPanel.hidden=false;
    else aiPanel.remove();
  }
  const endpointEl=document.getElementById('ollamaEndpoint'),modelEl=document.getElementById('ollamaModel'),researchEl=document.getElementById('researchEndpoint');
  if(endpointEl&&localStorage.getItem('ollamaEndpoint'))endpointEl.value=localStorage.getItem('ollamaEndpoint');
  if(modelEl){modelEl.value=normalizeLocalModel(localStorage.getItem('ollamaModel')||modelEl.value);localStorage.setItem('ollamaModel',modelEl.value)}
  if(researchEl&&localStorage.getItem('researchEndpoint'))researchEl.value=localStorage.getItem('researchEndpoint');
  drawScores();recalculate();loadTargets();
  AUTO_REFRESH.start();
}
init();
</script>
