<!doctype html>
<html lang="zh-Hant">

<body>
<header>
  <h1>2026 世界盃戰術沙盤 v2</h1>
  <div class="muted">Annex C → Third Place Engine → Bracket Engine → Monte Carlo → Strategy Impact Chain</div>
</header>
<div class="app">
  <div class="tabs">
    <button class="tab on" onclick="tab('scores',this)">賽事中心</button>
    <button class="tab" onclick="tab('standings',this)">小組積分</button>
    <button class="tab" onclick="tab('thirds',this)">第三名分析</button>
    <button class="tab" onclick="tab('bracket',this)">樹狀晉級賽程</button>
    <button class="tab" onclick="tab('sandbox',this)">情境沙盤</button>
    <button class="tab" onclick="tab('annex',this)">FIFA 2026 Annex C</button>
  </div>

  <section id="scores" class="panel on">
    <div class="card toolbar">
      <button onclick="clearFuture()">清除未開賽預測比分</button>
      <button onclick="recalculate()">重新計算</button>
      <span id="dataMeta" class="muted"></span>
    </div>
    <div id="scoreBoard"></div>
  </section>

  <section id="standings" class="panel">
    <div id="standingBoard" class="grid"></div>
  </section>

  <section id="thirds" class="panel">
    <div class="two">
      <div class="card"><h3>第三名總排序</h3><div id="thirdBoard"></div></div>
      <div class="card"><h3>Third Place Engine</h3><div id="thirdAssign"></div></div>
    </div>
  </section>

  <section id="bracket" class="panel">
    <div class="subtabs">
      <button class="subtab on" onclick="round('r32',this)">32強</button>
      <button class="subtab" onclick="round('r16',this)">16強</button>
      <button class="subtab" onclick="round('qf',this)">8強</button>
    </div>
    <div id="r32" class="round on"></div>
    <div id="r16" class="round" style="display:none"></div>
    <div id="qf" class="round" style="display:none"></div>
  </section>

  <section id="sandbox" class="panel">
    <div class="card toolbar">
      <label>隊伍 <select id="target" onchange="loadTeamMatches();runMonteCarlo()"></select></label>
      <label>比賽 <select id="targetMatch"></select></label>
      <label>Monte Carlo <input id="mcRuns" class="score" value="400" min="80" max="1200" type="number"></label>
      <button onclick="runMatrix()">產生比分矩陣建議</button>
      <button onclick="runMonteCarlo()">重跑對手機率</button>
    </div>
    <div id="targetSnapshot" class="kpi"></div>
    <div class="two">
      <div id="monteCarlo" class="card"></div>
      <div id="strategySummary" class="card"></div>
    </div>
    <div id="matrix"></div>
  </section>

  <section id="annex" class="panel">
    <div class="two">
      <div class="card">
        <h3>FIFA 2026 Annex C 排名順序</h3>
        <div class="chain"><b>1</b><span>小組賽積分。</span></div>
        <div class="chain"><b>2</b><span>小組賽總淨勝球。</span></div>
        <div class="chain"><b>3</b><span>小組賽總進球數。</span></div>
        <div class="chain"><b>4</b><span>同分隊伍互相比賽積分。</span></div>
        <div class="chain"><b>5</b><span>同分隊伍互相比賽淨勝球。</span></div>
        <div class="chain"><b>6</b><span>同分隊伍互相比賽進球數。</span></div>

      </div>
      <div class="card">

    </div>
  </section>
</div>

function tab(id,b){document.querySelectorAll('.panel').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));document.getElementById(id).classList.add('on');b.classList.add('on');recalculate()}

function clearFuture(){MATCHES.forEach(m=>{if(!m.done){m.hg=null;m.ag=null}});drawScores();recalculate()}

function mergeScores(payload){
  const raw=(payload&&payload.matches)||[];
  const byPair=new Map(raw.map(m=>[norm(m.home)+'|'+norm(m.away),m]));
  MATCHES=SEED.map(seed=>{
    const remote=byPair.get(norm(seed.h)+'|'+norm(seed.a))||byPair.get(norm(seed.a)+'|'+norm(seed.h))||raw.find(x=>x.id===seed.id)||{};
    const reversed=remote.home&&norm(remote.home)===norm(seed.a);
    const hg=reversed?remote.away_score:remote.home_score;
    const ag=reversed?remote.home_score:remote.away_score;
    const status=remote.status||seed.status;
    return {...seed,hg:hg??null,ag:ag??null,status,done:['FINISHED','AWARDED'].includes(status)};
  });
  DATA_META=`資料來源：${payload.source||'seed'}｜更新：${payload.updated_at||'尚未更新'}`;

const ANNEX_C_ENGINE={
  blankTeam(group,team){return{group,team,P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0,str:0,rankNote:''}},
  calculate(matches){
    const st={};Object.keys(GROUPS).forEach(g=>st[g]=GROUPS[g].map(t=>this.blankTeam(g,t)));
    matches.forEach(m=>{if(!isPlayed(m))return;let h=st[m.g].find(x=>x.team===m.h),a=st[m.g].find(x=>x.team===m.a);if(!h||!a)return;h.P++;a.P++;h.GF+=m.hg;h.GA+=m.ag;a.GF+=m.ag;a.GA+=m.hg;if(m.hg>m.ag){h.W++;a.L++;h.Pts+=3}else if(m.hg<m.ag){a.W++;h.L++;a.Pts+=3}else{h.D++;a.D++;h.Pts++;a.Pts++}});
    Object.keys(st).forEach(g=>{st[g].forEach(x=>{x.GD=x.GF-x.GA;x.str=this.teamStrength(x)});st[g]=this.rankGroup(st[g],matches.filter(m=>m.g===g))});
    return st;
  },
  teamStrength(t){return Math.round((RATING[t.team]||70)+t.Pts*5+t.GD*2+t.GF)},
  rankGroup(rows,groupMatches){
    const base=[...rows].sort((a,b)=>b.Pts-a.Pts||b.GD-a.GD||b.GF-a.GF);
    let out=[];
    for(let i=0;i<base.length;){
      let tied=base.filter(x=>x.Pts===base[i].Pts&&x.GD===base[i].GD&&x.GF===base[i].GF);
      if(tied.length===1){out.push(base[i]);i++;continue}
      let mini=this.miniTable(tied.map(x=>x.team),groupMatches);
      tied.sort((a,b)=>mini[b.team].Pts-mini[a.team].Pts||mini[b.team].GD-mini[a.team].GD||mini[b.team].GF-mini[a.team].GF||a.team.localeCompare(b.team,'zh-Hant'));
      tied.forEach(x=>x.rankNote='Annex C 同分組：已套用對戰成績，若仍同分則需公平競賽/抽籤');
      out.push(...tied);i+=tied.length;
    }
    return out;
  },
  miniTable(teams,matches){
    const mini={};teams.forEach(t=>mini[t]={Pts:0,GF:0,GA:0,GD:0});
    matches.forEach(m=>{if(!isPlayed(m)||!teams.includes(m.h)||!teams.includes(m.a))return;mini[m.h].GF+=m.hg;mini[m.h].GA+=m.ag;mini[m.a].GF+=m.ag;mini[m.a].GA+=m.hg;if(m.hg>m.ag)mini[m.h].Pts+=3;else if(m.hg<m.ag)mini[m.a].Pts+=3;else{mini[m.h].Pts++;mini[m.a].Pts++}});
    Object.values(mini).forEach(x=>x.GD=x.GF-x.GA);return mini;
  }
};
const THIRD_PLACE_ENGINE={
  ranking(st){return Object.keys(st).map(g=>({...st[g][2],seed:g+'3'})).sort((a,b)=>b.Pts-a.Pts||b.GD-a.GD||b.GF-a.GF||b.str-a.str||a.group.localeCompare(b.group))},
  qualified(st){return this.ranking(st).slice(0,8)},
  assign(st){
    const qualified=this.qualified(st).map(x=>x.group),slots=Object.keys(THIRD_RULE),out={},used=new Set();
    const dfs=i=>{if(i===slots.length)return true;const slot=slots[i];const choices=THIRD_RULE[slot].filter(g=>qualified.includes(g)&&!used.has(g));for(const g of choices){used.add(g);out[slot]=g;if(dfs(i+1))return true;used.delete(g);delete out[slot]}return false};
    dfs(0);return out;
  }
};
const BRACKET_ENGINE={
  slot(st,thirdMap,matchId,seed){
    if(seed==='3'){let g=thirdMap[matchId];if(!g)return{seed:'最佳3',team:'候選 '+THIRD_RULE[matchId].join('/'),str:74,group:null,rank:3};let t=st[g][2];return{seed:g+'3',team:t.team,str:t.str,group:g,rank:3}}
    let g=seed[0],rank=+seed.slice(1),t=st[g][rank-1];return{seed,team:t.team,str:t.str,group:g,rank};
  },
  r32(st){const thirdMap=THIRD_PLACE_ENGINE.assign(st);return R32_TEMPLATE.map(([id,a,b])=>({id,a:this.slot(st,thirdMap,id,a),b:this.slot(st,thirdMap,id,b)}))},
  findTeam(team,bracket){let m=bracket.find(x=>x.a.team===team||x.b.team===team);if(!m)return null;let self=m.a.team===team?m.a:m.b,opp=m.a.team===team?m.b:m.a;return{match:m,self,opp,route:this.routeStrength(m,team,bracket)}},
  routeStrength(match,team,bracket){let first=(match.a.team===team?match.b:match.a).str;let side=bracket.indexOf(match)<8?bracket.slice(0,8):bracket.slice(8);let avg=side.reduce((s,m)=>s+m.a.str+m.b.str,0)/(side.length*2);return Math.round(first*.65+avg*.35)}
};
const MONTE_CARLO_ENGINE={
  runs(team,count){
    const opponentCounts={},seedCounts={},route=[],qual={in:0,out:0};
    for(let i=0;i<count;i++){
      const sim=MATCHES.map(m=>({...m}));
      sim.forEach(m=>{if(isPlayed(m))return;let r=this.randomScore(m.h,m.a);m.hg=r[0];m.ag=r[1]});
      const st=ANNEX_C_ENGINE.calculate(sim),br=BRACKET_ENGINE.r32(st),path=BRACKET_ENGINE.findTeam(team,br);
      if(path){qual.in++;opponentCounts[path.opp.team]=(opponentCounts[path.opp.team]||0)+1;seedCounts[path.self.seed]=(seedCounts[path.self.seed]||0)+1;route.push(path.route)}else qual.out++;
    }
    return{team,count,qual,opponents:this.percentRows(opponentCounts,count),seeds:this.percentRows(seedCounts,count),avgRoute:route.length?Math.round(route.reduce((a,b)=>a+b,0)/route.length):0};
  },
  percentRows(obj,total){return Object.entries(obj).map(([name,n])=>({name,n,pct:Math.round(n/total*100)})).sort((a,b)=>b.n-a.n||a.name.localeCompare(b.name,'zh-Hant'))},
  randomScore(home,away){const diff=((RATING[home]||70)-(RATING[away]||70))/16;const hBase=1.25+Math.max(-.55,Math.min(.75,diff));const aBase=1.05+Math.max(-.55,Math.min(.75,-diff));return[this.goals(hBase),this.goals(aBase)]},
  goals(lambda){let x=0,p=Math.exp(-lambda),s=p,r=Math.random();while(r>s&&x<7){x++;p*=lambda/x;s+=p}return x}
};
const STRATEGY_ENGINE={
  snapshot(team,st,br){const g=Object.keys(st).find(k=>st[k].some(x=>x.team===team));let rank=g?st[g].findIndex(x=>x.team===team)+1:0;let row=g?st[g][rank-1]:null;let path=BRACKET_ENGINE.findTeam(team,br);return{team,group:g,rank,row,path,qualified:!!path,seed:path?path.self.seed:'淘汰',route:path?path.route:99}},
  resultFor(team,matchId,forGoals,againstGoals,label){
    const sim=MATCHES.map(x=>({...x})),m=sim.find(x=>x.id===matchId),home=m.h===team;m.hg=home?forGoals:againstGoals;m.ag=home?againstGoals:forGoals;
    const st=ANNEX_C_ENGINE.calculate(sim),br=BRACKET_ENGINE.r32(st),snap=this.snapshot(team,st,br);
    return{label,st,br,snap,impacts:this.impactChain(STATE.standings,STATE.bracket,st,br,team)};
  },
  impactChain(oldSt,oldBr,newSt,newBr,target){
    return Object.values(GROUPS).flat().filter(t=>t!==target).map(t=>{let before=this.snapshot(t,oldSt,oldBr),after=this.snapshot(t,newSt,newBr);return{team:t,before,after,score:this.impactScore(before,after)}}).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,7);
  },
  impactScore(a,b){return(a.qualified!==b.qualified?8:0)+(a.seed!==b.seed?4:0)+(a.route!==b.route?Math.min(5,Math.abs(a.route-b.route)/4):0)+(a.rank!==b.rank?2:0)},
  recommendation(rows){let best=[...rows].sort((a,b)=>a.snap.route-b.snap.route||a.snap.rank-b.snap.rank||b.snap.row.Pts-a.snap.row.Pts)[0];let volatile=rows.filter(x=>x.impacts.length>=4).length;let floor=rows.find(x=>x.snap.qualified);if(!best)return'目前沒有可用情境。';return `建議優先目標：${best.label}，預估身份 ${best.snap.seed}，路線強度 ${best.snap.route}。${floor?'最低可接受結果：'+floor.label+' 仍保有32強路線。':'目前所有情境都偏向淘汰，必須提高勝球差。'} ${volatile?'多個比分會大幅改變其他隊伍命運，需避免把競爭對手送進更好的第三名槽位。':'主要影響集中在自身排名與首輪對手。'}`;
  }
};

function drawScores(){
  const dates=[...new Set(MATCHES.map(x=>x.date))];
  scoreBoard.innerHTML=dates.map(dt=>`<div class=card><h3>${d(dt)} 賽程</h3><table><thead><tr><th>日期</th><th>組</th><th>主隊</th><th>主分</th><th>客分</th><th>客隊</th><th>狀態</th></tr></thead><tbody>${MATCHES.filter(x=>x.date===dt).map(m=>`<tr><td>${d(m.date)}</td><td>${m.g}</td><td class=team>${m.h}</td><td><input class=score id=h${m.id} value='${m.hg??''}' ${m.done?'disabled':''} onchange='saveInputs();recalculate()'></td><td><input class=score id=a${m.id} value='${m.ag??''}' ${m.done?'disabled':''} onchange='saveInputs();recalculate()'></td><td class=team>${m.a}</td><td><span class='pill ${statusClass(m)}'>${statusText(m)}</span></td></tr>`).join('')}</tbody></table></div>`).join('');
  dataMeta.textContent=DATA_META;
}
function drawStandings(){
  standingBoard.innerHTML=Object.keys(STATE.standings).map(g=>`<div class=card><h3>${g}組</h3><table><thead><tr><th>名</th><th>隊伍</th><th>賽</th><th>積</th><th>淨</th><th>進/失</th></tr></thead><tbody>${STATE.standings[g].map((x,i)=>`<tr class=r${i+1}><td>${i+1}</td><td>${x.team}${x.rankNote?' <span class=warn>*</span>':''}</td><td>${x.P}</td><td><b>${x.Pts}</b></td><td>${x.GD}</td><td>${x.GF}/${x.GA}</td></tr>`).join('')}</tbody></table></div>`).join('');
}
function drawThirds(){
  thirdBoard.innerHTML=`<table><thead><tr><th>排序</th><th>種子</th><th>隊伍</th><th>積</th><th>淨</th><th>進球</th><th>狀態</th></tr></thead><tbody>${STATE.thirdRanking.map((x,i)=>`<tr class=${i<8?'r3':'r4'}><td>${i+1}</td><td>${x.seed}</td><td>${x.team}</td><td>${x.Pts}</td><td>${x.GD}</td><td>${x.GF}</td><td>${i<8?'晉級':'淘汰區'}</td></tr>`).join('')}</tbody></table>`;
  thirdAssign.innerHTML=Object.keys(THIRD_RULE).map(slot=>`<div class=chain><b>${slot}</b><span><span class=badge>${STATE.thirdMap[slot]||'未配置'}</span> 可用：${THIRD_RULE[slot].join(' / ')}</span></div>`).join('');
}
function matchCard(m){return `<div class=match><b>${m.id}</b><div class=line><span class=seed>${m.a.seed}</span><span>${m.a.team}</span></div><div class=line><span class=seed>${m.b.seed}</span><span>${m.b.team}</span></div></div>`}
function drawBracket(){
  r32.innerHTML=`<div class=bracket><div class=card><h3>32強左半區</h3>${STATE.bracket.slice(0,8).map(matchCard).join('')}</div><div class=card><h3>32強右半區</h3>${STATE.bracket.slice(8).map(matchCard).join('')}</div></div>`;
  r16.innerHTML=`<div class=bracket>${R16_TEMPLATE.map(x=>`<div class=match><b>${x[0]}</b><br>${x[1]}勝者 vs ${x[2]}勝者</div>`).join('')}</div>`;
  qf.innerHTML=`<div class=bracket>${QF_TEMPLATE.map(x=>`<div class=match><b>${x[0]}</b><br>${x[1]}勝者 vs ${x[2]}勝者</div>`).join('')}</div>`;
}
function loadTargets(){target.innerHTML=Object.values(GROUPS).flat().map(t=>`<option>${t}</option>`).join('');loadTeamMatches()}
function loadTeamMatches(){let t=target.value,ms=MATCHES.filter(m=>!m.done&&(m.h===t||m.a===t)).sort((a,b)=>a.date.localeCompare(b.date));targetMatch.innerHTML=ms.map(m=>`<option value=${m.id}>${d(m.date)} ${m.h} vs ${m.a}</option>`).join('');drawTargetSnapshot()}
function drawTargetSnapshot(){
  if(!STATE)return;
  const s=STRATEGY_ENGINE.snapshot(target.value,STATE.standings,STATE.bracket);
  targetSnapshot.innerHTML=[['小組排名',s.row?`${s.group}${s.rank}`:'-'],['目前身份',s.seed],['路線強度',s.qualified?s.route:'-'],['首輪對手',s.path?s.path.opp.seed+' '+s.path.opp.team:'無']].map(x=>`<div class=card><div class=muted>${x[0]}</div><b>${x[1]}</b></div>`).join('');
}
function runMonteCarlo(){
  if(!STATE)return;const team=target.value,runs=Math.max(80,Math.min(1200,+mcRuns.value||400)),res=MONTE_CARLO_ENGINE.runs(team,runs);
  monteCarlo.innerHTML=`<h3>Monte Carlo Engine</h3><div class=muted>${runs} 次模擬剩餘賽事，估算首輪可能對手與路線強度。</div><div class=chain><b>${Math.round(res.qual.in/runs*100)}%</b><span>晉級32強機率｜平均路線強度 ${res.avgRoute||'-'}</span></div><h4>可能對手</h4>${res.opponents.slice(0,8).map(o=>`<div class=prob><div>${o.name}<div class=bar><i style='width:${o.pct}%'></i></div></div><div>${o.pct}%</div></div>`).join('')||'<div class=bad>模擬中未進32強</div>'}<h4>可能身份</h4>${res.seeds.map(o=>`<span class=badge>${o.name} ${o.pct}%</span>`).join('')}`;
}
function renderImpact(items){return items.map(x=>`<div class=chain><b>${x.team}</b><span>${x.before.seed} → ${x.after.seed}｜排名 ${x.before.group||'-'}${x.before.rank||'-'} → ${x.after.group||'-'}${x.after.rank||'-'}｜路線 ${x.before.qualified?x.before.route:'-'} → ${x.after.qualified?x.after.route:'-'}</span></div>`).join('')||'<div class=muted>沒有明顯外溢影響。</div>'}
function runMatrix(){
  const team=target.value,mid=+targetMatch.value;if(!mid)return;
  const cases=[];for(let n=1;n<=4;n++)cases.push([`勝${n}球`,n,0]);[[0,0],[1,1],[2,2]].forEach(x=>cases.push([`${x[0]}:${x[1]}和`,x[0],x[1]]));for(let n=1;n<=3;n++)cases.push([`輸${n}球`,0,n]);
  const rows=cases.map(c=>STRATEGY_ENGINE.resultFor(team,mid,c[1],c[2],c[0]));
  strategySummary.innerHTML=`<h3>Strategy Engine</h3><div class=good>${STRATEGY_ENGINE.recommendation(rows)}</div>`;
  matrix.innerHTML=`<div class=scenarios>${rows.map(r=>`<div class=scenario><h3>${r.label}｜${r.snap.seed}</h3><div>排名：${r.snap.row?`${r.snap.group}組第${r.snap.rank}｜${r.snap.row.Pts}分｜GD ${r.snap.row.GD}｜GF ${r.snap.row.GF}`:'淘汰'}</div><div class=warn>${r.snap.path?`${r.snap.path.match.id} 對 ${r.snap.path.opp.seed} ${r.snap.path.opp.team}`:'無32強對手'}｜路線強度 ${r.snap.qualified?r.snap.route:'-'}</div><h4>Strategy Impact Chain</h4>${renderImpact(r.impacts)}</div>`).join('')}</div>`;
}
function drawEngineStatus(){
  engineStatus.innerHTML=[
    ['Annex C Engine','小組排名與同分 tie-break 已啟用'],
    ['Third Place Engine',`目前最佳第三名：${STATE.thirdRanking.slice(0,8).map(x=>x.seed).join('、')}`],
    ['Bracket Engine',`32強槽位：${STATE.bracket.length} 場`],
    ['Monte Carlo Engine','以隊伍強度與目前積分形勢隨機模擬剩餘賽程'],
    ['Strategy Impact Chain','比較不同比分對所有隊伍種子、晉級與路線強度的外溢影響']
  ].map(x=>`<div class=chain><b>${x[0]}</b><span>${x[1]}</span></div>`).join('');
}
function recalculate(){
  saveInputs();
  const standings=ANNEX_C_ENGINE.calculate(MATCHES),thirdRanking=THIRD_PLACE_ENGINE.ranking(standings),thirdMap=THIRD_PLACE_ENGINE.assign(standings),bracket=BRACKET_ENGINE.r32(standings);
  STATE={standings,thirdRanking,thirdMap,bracket};
  drawStandings();drawThirds();drawBracket();drawTargetSnapshot();drawEngineStatus();
}
const AUTO_REFRESH={
  api:'https://api.github.com/repos/janjanpower/autoupload/commits/main',
  current:null,
  timer:null,
  async latestSha(){
    const res=await fetch(this.api,{cache:'no-store',headers:{Accept:'application/vnd.github+json'}});
    if(!res.ok)throw new Error('commit check failed');
    const payload=await res.json();
    return payload.sha||null;
  },
  async check(){
    try{
      const sha=await this.latestSha();
      if(!sha)return;
      if(!this.current){this.current=sha;return}
      if(sha!==this.current)location.reload();
    }catch(_){}
  },
  start(){
    this.check();
    this.timer=setInterval(()=>this.check(),60000);
  }
};
async function init(){
  try{const res=await fetch('data/matches.json',{cache:'no-store'});if(res.ok)mergeScores(await res.json());else mergeScores({matches:[]})}catch(_){mergeScores({matches:[]})}
  drawScores();recalculate();loadTargets();runMonteCarlo();
  AUTO_REFRESH.start();
}
init();
</script>
